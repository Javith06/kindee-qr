<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinDee Table QR Card Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Oswald:wght@500;600;700&family=Roboto+Condensed:wght@700;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ─── Reset & Page ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ───────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(15,23,42,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 40px; height: 40px;
      background: #EA580C;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff;
      box-shadow: 0 4px 14px rgba(234,88,12,0.35);
    }
    .header-title { font-size: 18px; font-weight: 800; background: linear-gradient(to right, #fb923c, #fbbf24); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .header-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    /* ─── Main Layout ──────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      gap: 24px;
      padding: 28px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── Controls Panel ───────────────────────────────── */
    .controls {
      width: 300px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(8px);
    }

    .controls h2 {
      font-size: 15px; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 14px;
    }
    .controls h2 i { color: #EA580C; }

    .field label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .field input[type="text"],
    .field input[type="url"] {
      width: 100%;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #EA580C; }

    .hint { font-size: 10px; color: #64748b; margin-top: 5px; }

    .download-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #EA580C, #f97316);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 6px 20px rgba(234,88,12,0.4);
      margin-top: auto;
    }
    .download-btn:hover { opacity: 0.92; }
    .download-btn:active { transform: scale(0.98); }
    .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-note {
      text-align: center;
      font-size: 10px;
      color: #64748b;
      margin-top: 6px;
    }

    /* ─── Preview Area ─────────────────────────────────── */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #64748b;
      text-transform: uppercase;
    }

    .preview-frame {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      width: 100%;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px;
    }

    /* scale wrapper so the card can scale without affecting layout */
    #cardWrapper {
      transform-origin: center center;
      transform: scale(0.65);
      display: inline-block;
      line-height: 0; /* removes inline-block bottom gap */
    }

    /* ────────────────────────────────────────────────────
       THE CARD — A7 landscape ratio: 105 × 74
       We build at 735 × 518px (exactly 105×7 : 74×7)
       ─────────────────────────────────────────────────── */
    #tableCard {
      width: 735px;
      height: 518px;
      display: flex;
      flex-direction: row;          /* HORIZONTAL: sidebar LEFT, QR RIGHT */
      background: #fff;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    /* ── Orange Sidebar (left ~34%) ─────────────────────── */
    .card-left {
      width: 252px;                 /* 34% of 735 */
      height: 100%;
      background: #EA580C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 28px 16px 24px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* White logo box */
    .logo-box {
      width: 118px;
      height: 118px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Slogan */
    .card-slogan {
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.2;
      text-transform: uppercase;
    }

    /* Table number tile */
    .table-tile {
      width: 148px;
      height: 148px;
      background: #fff8f5;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }
    .table-tile .t-label {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #9A3412;
      letter-spacing: 5px;
      text-transform: uppercase;
      line-height: 1;
    }
    .table-tile .t-number {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 82px;
      font-weight: 900;
      color: #111827; /* Very dark gray/black matching the mockup exactly */
      line-height: 0.9;
      letter-spacing: -2px;
      margin-top: 4px;
    }

    /* Mandala pattern decoration */
    .mandala {
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      height: 195px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    /* ── White Right Panel (QR code) ─────────────────────── */
    .card-right {
      flex: 1;
      height: 100%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .qr-border {
      border: 5px solid #EA580C;
      border-radius: 26px;
      padding: 16px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode canvas,
    #qrcode img {
      display: block;
      width: 300px !important;
      height: 300px !important;
    }

    /* ─── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 14px;
      font-size: 11px;
      color: #334155;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-brand">
      <div class="header-icon"><i class="fa-solid fa-qrcode"></i></div>
      <div>
        <div class="header-title">KinDee QR Studio</div>
        <div class="header-sub">Table Card Generator</div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Controls -->
    <div class="controls">
      <h2><i class="fa-solid fa-sliders"></i> Customize</h2>

      <div class="field">
        <label>Table Number</label>
        <input type="text" id="tableInput" value="R1" placeholder="e.g. R1, T5, 12" maxlength="6">
      </div>

      <div class="field">
        <label>QR Code Link</label>
        <input type="url" id="qrInput" value="https://kindee.menu/table/R1" placeholder="https://...">
        <p class="hint">The URL embedded in the QR code</p>
      </div>

      <button class="download-btn" id="downloadBtn">
        <i class="fa-solid fa-file-pdf"></i> Download A7 PDF
      </button>
      <p class="btn-note">A7 Landscape · 105mm × 74mm · Print-ready</p>
    </div>

    <!-- Preview -->
    <div class="preview-area">
      <div class="preview-label">Live Preview</div>

      <div class="preview-frame">
        <div id="cardWrapper">

          <!-- ═══════════════════════════════════════════════
               THE CARD  (735 × 518 px = A7 landscape ratio)
               ═══════════════════════════════════════════════ -->
          <div id="tableCard">

            <!-- LEFT: Orange sidebar -->
            <div class="card-left">

              <!-- Logo -->
              <div class="logo-box">
                <img id="cardLogo" src="kindeelogo.jpeg" alt="KinDee Logo">
              </div>

              <!-- Slogan -->
              <div class="card-slogan">Scan &amp; Order<br>Instantly</div>

              <!-- Mandala BG (styled inline for perfect html2canvas captures) -->
              <svg style="position: absolute; bottom: 2px; left: 0; width: 252px; height: 195px; opacity: 0.4; z-index: 1; pointer-events: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="252" height="195">
                <circle cx="100" cy="100" r="90" fill="none" stroke="#9E3300" stroke-width="1.5" stroke-dasharray="4,4"/>
                <circle cx="100" cy="100" r="75" fill="none" stroke="#9E3300" stroke-width="1"/>
                <circle cx="100" cy="100" r="60" fill="none" stroke="#9E3300" stroke-width="1.5" stroke-dasharray="2,3"/>
                <circle cx="100" cy="100" r="45" fill="none" stroke="#9E3300" stroke-width="1"/>
                <circle cx="100" cy="100" r="30" fill="none" stroke="#9E3300" stroke-width="1.5"/>
                
                <!-- Radiant Spokes -->
                <line x1="100" y1="10" x2="100" y2="190" stroke="#9E3300" stroke-width="0.8"/>
                <line x1="10" y1="100" x2="190" y2="100" stroke="#9E3300" stroke-width="0.8"/>
                <line x1="36" y1="36" x2="164" y2="164" stroke="#9E3300" stroke-width="0.8"/>
                <line x1="164" y1="36" x2="36" y2="164" stroke="#9E3300" stroke-width="0.8"/>
                
                <!-- Additional Angles -->
                <line x1="64" y1="18" x2="136" y2="182" stroke="#9E3300" stroke-width="0.6"/>
                <line x1="136" y1="18" x2="64" y2="182" stroke="#9E3300" stroke-width="0.6"/>
                <line x1="18" y1="64" x2="182" y2="136" stroke="#9E3300" stroke-width="0.6"/>
                <line x1="18" y1="136" x2="182" y2="64" stroke="#9E3300" stroke-width="0.6"/>
                
                <!-- Center Accents -->
                <circle cx="100" cy="100" r="8" fill="#9E3300" opacity="0.6"/>
                
                <!-- Tiny dots at outer bounds -->
                <circle cx="100" cy="20" r="3" fill="#9E3300"/>
                <circle cx="100" cy="180" r="3" fill="#9E3300"/>
                <circle cx="20" cy="100" r="3" fill="#9E3300"/>
                <circle cx="180" cy="100" r="3" fill="#9E3300"/>
                <circle cx="44" cy="44" r="2.5" fill="#9E3300"/>
                <circle cx="156" cy="156" r="2.5" fill="#9E3300"/>
                <circle cx="156" cy="44" r="2.5" fill="#9E3300"/>
                <circle cx="44" cy="156" r="2.5" fill="#9E3300"/>
              </svg>

              <!-- Table Number -->
              <div class="table-tile">
                <span class="t-label">Table</span>
                <span class="t-number" id="cardTable">R1</span>
              </div>

            </div>

            <!-- RIGHT: White area with QR -->
            <div class="card-right">
              <div class="qr-border">
                <div id="qrcode"></div>
              </div>
            </div>

          </div><!-- end #tableCard -->

        </div><!-- end #cardWrapper -->
      </div>

    </div><!-- end preview-area -->

  </main>

  <footer>© 2026 KinDee Thai Hotpot · Print-ready tabletop QR cards</footer>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    // ── QR Code init ──────────────────────────────────────
    const qrInput   = document.getElementById('qrInput');
    const tableInput = document.getElementById('tableInput');
    const cardTable  = document.getElementById('cardTable');
    const downloadBtn = document.getElementById('downloadBtn');
    const tableCard  = document.getElementById('tableCard');
    const cardWrapper = document.getElementById('cardWrapper');

    const qrContainer = document.getElementById('qrcode');

    let qr = new QRCode(qrContainer, {
      text: qrInput.value.trim(),
      width: 300,
      height: 300,
      colorDark: '#000',
      colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // ── Live Updates ──────────────────────────────────────
    tableInput.addEventListener('input', () => {
      cardTable.textContent = tableInput.value.trim() || '??';
    });

    qrInput.addEventListener('input', () => {
      const url = qrInput.value.trim();
      if (url) { qr.clear(); qr.makeCode(url); }
    });

    // ── Download as single-page A7 PDF ───────────────────
    downloadBtn.addEventListener('click', async () => {
      downloadBtn.disabled = true;
      downloadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating...';

      try {
        // Temporarily remove scale so html2canvas captures full size
        cardWrapper.style.transform = 'scale(1)';
        // Wait for repaint
        await new Promise(r => setTimeout(r, 100));

        const canvas = await html2canvas(tableCard, {
          scale: 3,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false
        });

        // Restore scale
        cardWrapper.style.transform = 'scale(0.65)';

        // Build PDF — A7 landscape: 105 × 74 mm
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [105, 74] });
        const imgData = canvas.toDataURL('image/png');
        // Fill the entire page — no margins
        pdf.addImage(imgData, 'PNG', 0, 0, 105, 74);
        pdf.save(`KinDee_Table_${tableInput.value.trim() || 'Card'}.pdf`);

      } catch (err) {
        alert('PDF generation failed: ' + err.message);
        console.error(err);
        cardWrapper.style.transform = 'scale(0.65)';
      }

      downloadBtn.disabled = false;
      downloadBtn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> Download A7 PDF';
    });
  </script>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Deep purple brand color: #4F1D96 -->
  <g fill="#4F1D96">
    <!-- Steam rising from hotpot -->
    <path d="M215,145 c-5,-15 5,-25 5,-35 c0,-10 -10,-15 -5,-30 c2,-5 5,-8 3,-12 c-2,4 -1,6 -3,10 c-5,15 5,25 5,35 c0,10 -10,15 -5,30 c2,5 4,7 3,12 c-1,-4 0,-7 -3,-10 Z" />
    <path d="M235,145 c-5,-15 5,-25 5,-35 c0,-10 -10,-15 -5,-30 c2,-5 5,-8 3,-12 c-2,4 -1,6 -3,10 c-5,15 5,25 5,35 c0,10 -10,15 -5,30 c2,5 4,7 3,12 c-1,-4 0,-7 -3,-10 Z" />
    <path d="M270,145 c-5,-15 5,-25 5,-35 c0,-10 -10,-15 -5,-30 c2,-5 5,-8 3,-12 c-2,4 -1,6 -3,10 c-5,15 5,25 5,35 c0,10 -10,15 -5,30 c2,5 4,7 3,12 c-1,-4 0,-7 -3,-10 Z" />
    <path d="M290,145 c-5,-15 5,-25 5,-35 c0,-10 -10,-15 -5,-30 c2,-5 5,-8 3,-12 c-2,4 -1,6 -3,10 c-5,15 5,25 5,35 c0,10 -10,15 -5,30 c2,5 4,7 3,12 c-1,-4 0,-7 -3,-10 Z" />

    <!-- Hotpot center chimney / funnel -->
    <path d="M232,175 L242,148 L268,148 L278,175 Z" />

    <!-- Hotpot main bowl -->
    <path d="M195,178 L315,178 A10,10 0 0,1 325,188 L320,205 A65,65 0 0,1 190,205 L185,188 A10,10 0 0,1 195,178 Z" />
    <!-- Bowl rim cut line (adds detail) -->
    <rect x="180" y="205" width="150" height="6" rx="3" />

    <!-- Hotpot stand / base -->
    <path d="M228,211 L218,245 L292,245 L282,211 Z" />
    <rect x="210" y="245" width="90" height="5" rx="2" />
  </g>

  <!-- Typography -->
  <!-- KinDee Text -->
  <text x="250" y="325" 
        font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" 
        font-weight="800" 
        font-size="62" 
        fill="#4F1D96" 
        text-anchor="middle" 
        letter-spacing="-1">KinDee</text>

  <!-- THAI HOTPOT Subtext -->
  <text x="250" y="365" 
        font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" 
        font-weight="600" 
        font-size="20" 
        fill="#4F1D96" 
        text-anchor="middle" 
        letter-spacing="4">THAI HOTPOT</text>
</svg>
